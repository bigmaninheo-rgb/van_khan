<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Văn Khấn - Sửa & Tùy chỉnh</title>
    
    <style>
        :root {
            --primary-color: #8B4513;
            --secondary-color: #D2691E;
            --accent-color: #FFD700;
            --text-color: #333;
            --bg-color: #FFF8DC;
            --card-bg: #FFFAF0;
            --border-color: #DEB887;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --success-color: #4CAF50;
            --warning-color: #FF9800;
            --error-color: #F44336;
        }

        [data-theme="dark"] {
            --primary-color: #D2691E;
            --secondary-color: #8B4513;
            --accent-color: #FFA500;
            --text-color: #F5DEB3;
            --bg-color: #2F1F1F;
            --card-bg: #3E2723;
            --border-color: #5D4037;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', serif;
            background: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .controls {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            border: 2px solid var(--border-color);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-section {
            flex: 1;
            min-width: 300px;
        }

        .search-input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            background: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(139, 69, 19, 0.2);
        }

        .btn {
            padding: 15px 25px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .btn:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .btn-success {
            background: var(--success-color);
        }

        .btn-warning {
            background: var(--warning-color);
        }

        .btn-danger {
            background: var(--error-color);
        }

        .prayers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .prayer-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 25px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
        }

        .prayer-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            border-color: var(--primary-color);
        }

        .prayer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }

        .prayer-title {
            font-size: 1.3em;
            font-weight: bold;
            color: var(--primary-color);
            flex: 1;
        }

        .prayer-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 14px;
            border-radius: 8px;
        }

        .prayer-content {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .prayer-content:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(139, 69, 19, 0.2);
        }

        .edit-controls {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
        }

        .status-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-saved {
            background: var(--success-color);
            color: white;
        }

        .status-modified {
            background: var(--warning-color);
            color: white;
        }

        .status-error {
            background: var(--error-color);
            color: white;
        }

        .quick-actions {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .quick-actions h3 {
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .quick-actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .quick-action-btn {
            padding: 15px 20px;
            background: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-align: center;
        }

        .quick-action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .notification {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 1001;
            animation: slideIn 0.3s ease;
            max-width: 300px;
        }

        .notification.success {
            background: var(--success-color);
        }

        .notification.error {
            background: var(--error-color);
        }

        .notification.warning {
            background: var(--warning-color);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .prayers-grid {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .quick-actions-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📝 Quản lý Văn Khấn</h1>
            <p>Sửa & Tùy chỉnh nhanh các bài văn khấn</p>
        </header>

        <div class="quick-actions">
            <h3>⚡ Hành động nhanh</h3>
            <div class="quick-actions-grid">
                <button class="quick-action-btn" onclick="fixAllDates()">
                    📅 Sửa tất cả ngày tháng
                </button>
                <button class="quick-action-btn" onclick="addAllPlaceholders()">
                    ..... Thêm tất cả "....."
                </button>
                <button class="quick-action-btn" onclick="resetAllChanges()">
                    🔄 Reset tất cả thay đổi
                </button>
                <button class="quick-action-btn" onclick="exportAllChanges()">
                    💾 Xuất tất cả thay đổi
                </button>
            </div>
        </div>

        <div class="controls">
            <div class="search-section">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Tìm kiếm bài khấn..." onkeyup="searchPrayers()">
            </div>
            <button class="btn btn-success" onclick="saveAllChanges()">
                💾 Lưu tất cả thay đổi
            </button>
            <button class="btn btn-warning" onclick="previewAllChanges()">
                👁️ Xem trước thay đổi
            </button>
        </div>

        <div class="prayers-grid" id="prayersGrid">
            <!-- Prayer cards will be dynamically loaded here -->
        </div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>

    <div id="notification" class="notification" style="display: none;"></div>

    <script>
        // Data structure for prayers
        const prayersData = [
            {
                id: 1,
                title: "Văn khấn cúng đầy tháng cho bé (đầy năm, đầy cữ)",
                filename: "prayer1.html",
                content: "",
                status: "saved"
            },
            {
                id: 2,
                title: "Văn khấn cúng thôi nôi cho bé (từ 1-3 tuổi)",
                filename: "prayer2.html",
                content: "",
                status: "saved"
            },
            // Add all 46 prayers here...
            {
                id: 46,
                title: "Văn khấn cúng tân gia, khai trương",
                filename: "prayer46.html",
                content: "",
                status: "saved"
            }
        ];

        let modifiedPrayers = {};
        let currentTheme = 'light';

        // Initialize app
        function initializeApp() {
            loadUserPreferences();
            loadPrayerContents();
            renderPrayers();
        }

        // Load user preferences
        function loadUserPreferences() {
            const theme = localStorage.getItem('theme') || 'light';
            currentTheme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            
            const themeBtn = document.querySelector('.theme-toggle');
            themeBtn.textContent = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
            
            // Load modified prayers
            const saved = localStorage.getItem('modifiedPrayers');
            if (saved) {
                modifiedPrayers = JSON.parse(saved);
            }
        }

        // Load prayer contents
        async function loadPrayerContents() {
            for (let prayer of prayersData) {
                try {
                    const response = await fetch(prayer.filename);
                    const content = await response.text();
                    prayer.content = content;
                    
                    // Check if modified
                    if (modifiedPrayers[prayer.id]) {
                        prayer.content = modifiedPrayers[prayer.id];
                        prayer.status = 'modified';
                    }
                } catch (error) {
                    console.error(`Error loading ${prayer.filename}:`, error);
                    prayer.status = 'error';
                }
            }
        }

        // Render prayers
        function renderPrayers() {
            const grid = document.getElementById('prayersGrid');
            grid.innerHTML = '';

            prayersData.forEach(prayer => {
                const card = createPrayerCard(prayer);
                grid.appendChild(card);
            });
        }

        // Create prayer card
        function createPrayerCard(prayer) {
            const card = document.createElement('div');
            card.className = 'prayer-card';
            card.id = `prayer-${prayer.id}`;

            const statusClass = prayer.status === 'modified' ? 'status-modified' : 
                               prayer.status === 'error' ? 'status-error' : 'status-saved';
            const statusText = prayer.status === 'modified' ? 'Đã sửa' : 
                              prayer.status === 'error' ? 'Lỗi' : 'Đã lưu';

            card.innerHTML = `
                <div class="prayer-header">
                    <div class="prayer-title">${prayer.title}</div>
                    <div class="status-indicator ${statusClass}">${statusText}</div>
                </div>
                <textarea class="prayer-content" id="content-${prayer.id}" placeholder="Nội dung bài khấn...">${prayer.content}</textarea>
                <div class="edit-controls">
                    <button class="btn btn-small btn-success" onclick="savePrayer(${prayer.id})">💾 Lưu</button>
                    <button class="btn btn-small" onclick="previewPrayer(${prayer.id})">👁️ Xem</button>
                    <button class="btn btn-small btn-warning" onclick="resetPrayer(${prayer.id})">🔄 Reset</button>
                    <button class="btn btn-small" onclick="openPrayer(${prayer.id})">📖 Mở</button>
                </div>
            `;

            return card;
        }

        // Search prayers
        function searchPrayers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.prayer-card');

            cards.forEach(card => {
                const title = card.querySelector('.prayer-title').textContent.toLowerCase();
                const content = card.querySelector('.prayer-content').value.toLowerCase();
                
                if (title.includes(searchTerm) || content.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // Save individual prayer
        function savePrayer(prayerId) {
            const content = document.getElementById(`content-${prayerId}`).value;
            const prayer = prayersData.find(p => p.id === prayerId);
            
            // Save to modified prayers
            modifiedPrayers[prayerId] = content;
            localStorage.setItem('modifiedPrayers', JSON.stringify(modifiedPrayers));
            
            // Update status
            prayer.status = 'modified';
            prayer.content = content;
            
            // Update UI
            updatePrayerStatus(prayerId, 'modified');
            showNotification('Đã lưu thay đổi!', 'success');
        }

        // Preview prayer
        function previewPrayer(prayerId) {
            const content = document.getElementById(`content-${prayerId}`).value;
            const newWindow = window.open('', '_blank');
            newWindow.document.write(`
                <html>
                    <head>
                        <title>Xem trước: ${prayersData.find(p => p.id === prayerId).title}</title>
                        <style>
                            body { font-family: 'Times New Roman', serif; line-height: 1.8; padding: 20px; }
                            pre { white-space: pre-wrap; }
                        </style>
                    </head>
                    <body>
                        <pre>${content}</pre>
                    </body>
                </html>
            `);
        }

        // Reset prayer
        function resetPrayer(prayerId) {
            const prayer = prayersData.find(p => p.id === prayerId);
            
            // Remove from modified prayers
            delete modifiedPrayers[prayerId];
            localStorage.setItem('modifiedPrayers', JSON.stringify(modifiedPrayers));
            
            // Reload original content
            loadPrayerContents().then(() => {
                renderPrayers();
                showNotification('Đã reset về bản gốc!', 'warning');
            });
        }

        // Open prayer in new tab
        function openPrayer(prayerId) {
            const prayer = prayersData.find(p => p.id === prayerId);
            window.open(prayer.filename, '_blank');
        }

        // Update prayer status
        function updatePrayerStatus(prayerId, status) {
            const card = document.getElementById(`prayer-${prayerId}`);
            const statusIndicator = card.querySelector('.status-indicator');
            
            statusIndicator.className = `status-indicator status-${status}`;
            statusIndicator.textContent = status === 'modified' ? 'Đã sửa' : 
                                       status === 'error' ? 'Lỗi' : 'Đã lưu';
        }

        // Quick action functions
        function fixAllDates() {
            const today = new Date();
            const duong_lich = `ngày ${today.getDate().toString().padStart(2, '0')}/${(today.getMonth() + 1).toString().padStart(2, '0')}/${today.getFullYear()}`;
            const amlich = '13/02/2026'; // Simplified for demo
            
            prayersData.forEach(prayer => {
                const content = document.getElementById(`content-${prayer.id}`).value;
                const fixedContent = content
                    .replace(/Hôm nay là ngày \d+\/\d+\/\d+/g, `Hôm nay là ngày ${duong_lich}`)
                    .replace(/Ngày âm lịch: \d+\/\d+\/\d+/g, `Ngày âm lịch: ${amlich}`)
                    .replace(/Ngày âm lịch: ngày \d+\/\d+\/\d+/g, `Ngày âm lịch: ${amlich}`);
                
                document.getElementById(`content-${prayer.id}`).value = fixedContent;
                savePrayer(prayer.id);
            });
            
            showNotification('Đã sửa tất cả ngày tháng!', 'success');
        }

        function addAllPlaceholders() {
            const placeholderReplacements = [
                { pattern: /Tín chủ con là\s+$/gm, replacement: 'Tín chủ con là .....' },
                { pattern: /ngụ tại:\s*$/gm, replacement: 'ngụ tại: .....' },
                { pattern: /tên là\s+$/gm, replacement: 'tên là .....' },
                { pattern: /sinh ngày\s+$/gm, replacement: 'sinh ngày .....' },
                { pattern: /Vợ chồng con là\s+sinh được con$/gm, replacement: 'Vợ chồng con là ..... sinh được con' }
            ];
            
            prayersData.forEach(prayer => {
                let content = document.getElementById(`content-${prayer.id}`).value;
                
                placeholderReplacements.forEach(({ pattern, replacement }) => {
                    content = content.replace(pattern, replacement);
                });
                
                document.getElementById(`content-${prayer.id}`).value = content;
                savePrayer(prayer.id);
            });
            
            showNotification('Đã thêm tất cả "....."!', 'success');
        }

        function resetAllChanges() {
            if (confirm('Bạn có chắc muốn reset tất cả thay đổi về bản gốc?')) {
                modifiedPrayers = {};
                localStorage.setItem('modifiedPrayers', JSON.stringify(modifiedPrayers));
                loadPrayerContents().then(() => {
                    renderPrayers();
                    showNotification('Đã reset tất cả về bản gốc!', 'warning');
                });
            }
        }

        function saveAllChanges() {
            let savedCount = 0;
            prayersData.forEach(prayer => {
                const content = document.getElementById(`content-${prayer.id}`).value;
                if (content !== prayer.content) {
                    savePrayer(prayer.id);
                    savedCount++;
                }
            });
            
            showNotification(`Đã lưu ${savedCount} thay đổi!`, 'success');
        }

        function previewAllChanges() {
            const newWindow = window.open('', '_blank');
            let previewContent = '<html><head><title>Xem trước tất cả thay đổi</title><style>body { font-family: Times New Roman; padding: 20px; } h2 { color: #8B4513; } .prayer { margin-bottom: 30px; border-bottom: 1px solid #ccc; padding-bottom: 20px; }</style></head><body><h1>Xem trước tất cả thay đổi</h1>';
            
            prayersData.forEach(prayer => {
                const content = document.getElementById(`content-${prayer.id}`).value;
                if (content !== prayer.content) {
                    previewContent += `<div class="prayer"><h2>${prayer.title}</h2><pre>${content}</pre></div>`;
                }
            });
            
            previewContent += '</body></html>';
            newWindow.document.write(previewContent);
        }

        function exportAllChanges() {
            const exportData = {
                timestamp: new Date().toISOString(),
                modifiedPrayers: modifiedPrayers,
                prayers: prayersData.map(prayer => ({
                    id: prayer.id,
                    title: prayer.title,
                    filename: prayer.filename,
                    currentContent: document.getElementById(`content-${prayer.id}`).value,
                    originalContent: prayer.content,
                    isModified: document.getElementById(`content-${prayer.id}`).value !== prayer.content
                }))
            };
            
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `van-khan-changes-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            showNotification('Đã xuất thay đổi!', 'success');
        }

        // Theme toggle
        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('theme', currentTheme);
            
            const themeBtn = document.querySelector('.theme-toggle');
            themeBtn.textContent = currentTheme === 'dark' ? '☀️ Light' : '🌙 Dark';
        }

        // Show notification
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        // Auto-save functionality
        function setupAutoSave() {
            let saveTimeout;
            
            document.addEventListener('input', (e) => {
                if (e.target.classList.contains('prayer-content')) {
                    clearTimeout(saveTimeout);
                    saveTimeout = setTimeout(() => {
                        const prayerId = parseInt(e.target.id.split('-')[1]);
                        savePrayer(prayerId);
                    }, 2000); // Auto-save after 2 seconds of inactivity
                }
            });
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            initializeApp();
            setupAutoSave();
            showNotification('Đã tải xong quản lý văn khấn!', 'success');
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                switch(e.key) {
                    case 's':
                        e.preventDefault();
                        saveAllChanges();
                        break;
                    case 'f':
                        e.preventDefault();
                        document.getElementById('searchInput').focus();
                        break;
                    case 'r':
                        e.preventDefault();
                        if (confirm('Reset tất cả thay đổi?')) {
                            resetAllChanges();
                        }
                        break;
                }
            }
        });
    </script>
</body>
</html>
